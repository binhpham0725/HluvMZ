<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tin tức | Tạp chí ĐH Hoa Lư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
    <header class="site-header" id="site-header"></header>
    <main class="container">
        <section class="panel p-4">
            <div class="section-heading">
                <div>
                    <p class="story-meta">Tin tức</p>
                    <h1 id="category-title">Tất cả tin tức</h1>
                    <p style="color:var(--muted);margin:0;">Trang này dùng để lọc, tra cứu và đọc toàn bộ bài viết theo chuyên mục.</p>
                </div>
                <p id="category-count"></p>
            </div>
            <div class="category-toolbar">
                <div id="category-tabs" class="filters"></div>
                <input id="category-search" type="search" placeholder="Tìm trong tin tức..." />
            </div>
        </section>
        <div id="articles" class="story-grid"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../config/messages.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/validators.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/postService.js"></script>
    <script src="../services/userService.js"></script>
    <script src="../services/bookmarkService.js"></script>
    <script src="../services/authService.js"></script>
    <script src="../components/articleCard.js"></script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../scripts/category.js"></script>
</body>
</html>
