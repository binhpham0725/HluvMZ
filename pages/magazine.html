<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magazine | Tạp chí ĐH Hoa Lư</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
    <div class="sticky-progress" id="reading-progress"></div>
    <header class="site-header" id="site-header"></header>
    <main>
        <section class="hero">
            <div class="hero-left">
                <p class="story-meta">Magazine Online</p>
                <h1>Tạp chí Đại học Hoa Lư</h1>
                <p>Trang Magazine là nơi hiển thị toàn bộ bài viết theo dạng tạp chí, giúp người dùng đọc nội dung một cách tập trung hơn.</p>
            </div>
            <aside class="right-aside p-3">
                <p class="story-meta">Điều khiển đọc</p>
                <h3>Lọc và sắp xếp</h3>
                <div class="magazine-controls">
                    <select id="magazine-category">
                        <option value="Tất cả">Tất cả chuyên mục</option>
                    </select>
                    <select id="magazine-sort">
                        <option value="newest">Mới nhất</option>
                        <option value="popular">Phổ biến</option>
                    </select>
                </div>
            </aside>
        </section>
        <section class="section">
            <div class="section-heading">
                <div>
                    <p class="story-meta">Danh sách đầy đủ</p>
                    <h2>Toàn bộ bài viết</h2>
                </div>
                <p id="magazine-count"></p>
            </div>
            <div id="magazine-list" class="magazine-list"></div>
            <div class="load-more-wrap">
                <button class="chip" id="magazine-load-more" type="button">Xem thêm</button>
            </div>
        </section>
    </main>
    <button id="back-top">↑</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../config/messages.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/validators.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/postService.js"></script>
    <script src="../services/userService.js"></script>
    <script src="../services/bookmarkService.js"></script>
    <script src="../services/authService.js"></script>
    <script src="../components/articleCard.js"></script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../scripts/magazine.js"></script>
</body>
</html>
