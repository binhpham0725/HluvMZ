<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magazine | Tạp chí ĐH Hoa Lư</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
    <div class="sticky-progress" id="reading-progress"></div>
    <header class="site-header" id="site-header"></header>
    <main>
        <section class="hero">
            <div class="hero-left">
                <p class="story-meta">Magazine Online</p>
                <h1>Tạp chí Đại học Hoa Lư</h1>
                <p>Đón đọc tin tức, bài học, kỹ năng và giải trí, cập nhật mỗi ngày. Hệ thống hỗ trợ chế độ sáng/tối, tìm kiếm, bookmark và trình duyệt thân thiện.</p>
                <div class="filters" id="category-filters"></div>
            </div>
            <aside class="right-aside p-3">
                <h3>Top chủ đề</h3>
                <ul style="margin:0;padding-left:1rem;color:var(--muted);">
                    <li>Công nghệ</li>
                    <li>Đời sống</li>
                    <li>Học tập</li>
                    <li>Giải trí</li>
                    <li>Sự kiện</li>
                </ul>
            </aside>
        </section>
        <section class="section">
            <div class="section-heading">
                <div>
                    <p class="story-meta">Tin mới</p>
                    <h2>Bài viết mới nhất</h2>
                </div>
                <button class="chip" id="load-more">Xem thêm</button>
            </div>
            <div id="articles" class="story-grid"></div>
        </section>
    </main>
    <button id="back-top">↑</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../config/messages.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/validators.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/postService.js"></script>
    <script src="../services/userService.js"></script>
    <script src="../services/bookmarkService.js"></script>
    <script src="../services/authService.js"></script>
    <script src="../components/articleCard.js"></script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../scripts/magazine.js"></script>
</body>
</html>
