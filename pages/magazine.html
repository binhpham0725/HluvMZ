<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magazine | Tạp chí ĐH Hoa Lư</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
    <div class="sticky-progress" id="reading-progress"></div>
    <header class="site-header" id="site-header"></header>
    <main>
        <section class="hero">
            <div class="hero-left">
                <p class="story-meta">Magazine Online</p>
                <h1>Tạp chí Đại học Hoa Lư</h1>
                <p>Ấn phẩm dạng magazine: một bài cover nổi bật, các lựa chọn của ban biên tập và từng cụm chuyên mục để đọc như một số báo online.</p>
            </div>
            <aside class="right-aside p-3">
                <p class="story-meta">Editor's Picks</p>
                <h3>Ban biên tập chọn</h3>
                <div id="editor-picks" class="editor-picks"></div>
            </aside>
        </section>
        <section class="section">
            <div class="section-heading">
                <div>
                    <p class="story-meta">Cover Story</p>
                    <h2>Bài nổi bật trong số này</h2>
                </div>
            </div>
            <div id="magazine-cover" class="magazine-cover"></div>
        </section>
        <section class="section">
            <div class="section-heading">
                <div>
                    <p class="story-meta">Theo chuyên mục</p>
                    <h2>Các lát cắt nội dung</h2>
                </div>
            </div>
            <div id="magazine-sections" class="magazine-sections"></div>
        </section>
    </main>
    <button id="back-top">↑</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../config/messages.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/validators.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/postService.js"></script>
    <script src="../services/userService.js"></script>
    <script src="../services/bookmarkService.js"></script>
    <script src="../services/authService.js"></script>
    <script src="../components/articleCard.js"></script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../scripts/magazine.js"></script>
</body>
</html>
