<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng bài | Tạp chí ĐH Hoa Lư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
    <header class="site-header" id="site-header"></header>
    <main class="container">
        <section class="panel p-4">
            <p class="story-meta">Tác giả</p>
            <div class="section-heading">
                <h1 id="post-form-title">Đăng bài mới</h1>
                <a class="chip" href="profile-posts.html">Bài đăng của bạn</a>
            </div>
            <form id="post-form">
                <label for="post-title">Tiêu đề</label>
                <input id="post-title" required placeholder="Nhập tiêu đề bài viết..." />
                <label for="post-category">Tag / Chuyên mục</label>
                <select id="post-category" required>
                    <option value="">Chọn tag...</option>
                    <option value="Công nghệ">Công nghệ</option>
                    <option value="Đời sống">Đời sống</option>
                    <option value="Học tập">Học tập</option>
                    <option value="Giải trí">Giải trí</option>
                    <option value="Sự kiện">Sự kiện</option>
                </select>
                <label for="post-image-file">Thêm ảnh</label>
                <input id="post-image-file" type="file" accept="image/*" />
                <label for="post-image-url">Hoặc dán link ảnh</label>
                <input id="post-image-url" type="text" placeholder="https://example.com/image.jpg" />
                <img id="image-preview" class="image-preview" style="display:none;" alt="Preview ảnh bài viết" />
                <label for="post-content">Nội dung</label>
                <textarea id="post-content" rows="8" required placeholder="Nhập nội dung bài viết..."></textarea>
                <button class="btn mt-3" type="submit">Đăng bài</button>
            </form>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/config/constants.js"></script>
    <script src="/config/messages.js"></script>
    <script src="/utils/storage.js"></script>
    <script src="/utils/validators.js"></script>
    <script src="/utils/helpers.js"></script>
    <script src="/services/api.js"></script>
    <script src="/services/postService.js"></script>
    <script src="/services/userService.js"></script>
    <script src="/services/bookmarkService.js"></script>
    <script src="/services/authService.js"></script>
    <script src="/components/articleCard.js"></script>
    <script src="/components/header.js"></script>
    <script src="/components/footer.js"></script>
    <script src="/scripts/postEditor.js"></script>
</body>
</html>
