<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | Tạp chí ĐH Hoa Lư</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1>Đăng nhập / Đăng ký</h1>

      <div class="tabs">
        <div class="tab active" id="tab-login">Đăng nhập</div>
        <div class="tab" id="tab-register">Đăng ký</div>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Mật khẩu</label>
          <input id="login-password" type="password" required>
        </div>
        <button type="submit">Đăng nhập</button>
      </form>

      <form id="register-form" style="display:none;">
        <div class="form-group">
          <label for="register-name">Họ và tên</label>
          <input id="register-name" type="text" required>
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input id="register-email" type="email" required>
        </div>
        <div class="form-group">
          <label for="register-password">Mật khẩu</label>
          <input id="register-password" type="password" required>
        </div>
        <div class="form-group">
          <label for="register-confirm-password">Xác nhận mật khẩu</label>
          <input id="register-confirm-password" type="password" required>
        </div>
        <button type="submit">Đăng ký</button>
      </form>

      <p style="margin-top:16px;color:var(--muted);">
        Tài khoản mẫu: admin@hluv.local / admin123
      </p>
    </section>
  </main>

  <script type="module" src="../scripts/login.js"></script>
</body>
</html>
