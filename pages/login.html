<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Tạp chí ĐH Hoa Lư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="auth-page">
    <div class="bubble-container" aria-hidden="true"></div>
    <div class="auth-shell">
    <div class="auth-card glass-card">
        <div class="auth-heading">
            <div class="login-lock" aria-hidden="true">🔒</div>
            <div class="text-center">
                <h1>Đăng nhập hệ thống</h1>
                <p>Chào mừng bạn trở lại! Vui lòng nhập thông tin.</p>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-login">Đăng nhập</div>
            <div class="tab" id="tab-register">Đăng ký</div>
        </div>
        <form id="login-form" style="display:block;">
            <label for="email-login">Email</label>
            <input id="email-login" type="email" required />
            <label for="password-login">Mật khẩu</label>
            <input id="password-login" type="password" required />
            <button class="btn w-100 mt-3" type="submit">Đăng nhập</button>
        </form>
        <form id="register-form" style="display:none;">
            <label for="name-register">Họ và tên</label>
            <input id="name-register" type="text" maxlength="12" pattern="[\p{L}\p{N}\s]{1,12}" title="Tối đa 12 ký tự, không dùng ký tự đặc biệt" required />
            <label for="email-register">Email</label>
            <input id="email-register" type="email" required />
            <label for="gender-register">Giới tính</label>
            <select id="gender-register" required>
                <option value="">Chọn giới tính</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
            <label for="birthdate-register">Ngày sinh</label>
            <input id="birthdate-register" type="date" required />
            <label for="password-register">Mật khẩu</label>
            <input id="password-register" type="password" required />
            <label for="confirm-password-register">Xác nhận mật khẩu</label>
            <input id="confirm-password-register" type="password" required />
            <button class="btn w-100 mt-3" type="submit">Đăng ký</button>
        </form>
    </div>
    <div class="auth-links">
        <a href="about.html">Chính sách bảo mật</a>
        <a href="about.html">Điều khoản dịch vụ</a>
        <a href="about.html">Hỗ trợ</a>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../config/messages.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/validators.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/postService.js"></script>
    <script src="../services/userService.js"></script>
    <script src="../services/bookmarkService.js"></script>
    <script src="../services/authService.js"></script>
    <script src="../components/articleCard.js"></script>
    <script src="../scripts/login.js"></script>
</body>
</html>
