<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết bài viết | Tạp chí ĐH Hoa Lư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
    <div class="sticky-progress" id="reading-progress"></div>
    <header class="site-header" id="site-header"></header>
    <main class="container">
        <div class="article-header">
            <p class="story-meta" id="article-category">Chuyên mục</p>
            <h1 id="article-title">Đang tải...</h1>
            <div class="meta-grid">
                <div><strong>Tác giả</strong><p id="article-author">Ban biên tập</p></div>
                <div><strong>Ngày đăng</strong><p id="article-date">--</p></div>
                <div><strong>Độ dài</strong><p id="article-readtime">0 min</p></div>
            </div>
            <div class="article-actions">
                <button class="btn primary" id="bookmark-btn">Lưu bài</button>
                <button class="btn primary" id="like-btn">Thích</button>
                <span class="like-count"><strong id="like-count">0</strong> lượt thích</span>
                <button class="btn secondary" id="share-btn">Chia sẻ</button>
            </div>
        </div>
        <div class="article-cover"><img id="article-image" src="../assets/images/placeholder.svg" alt=""></div>
        <article class="article-content" id="article-content"></article>
        <div class="tag-list" id="tag-list"></div>
        <section class="comments panel p-4">
            <div class="section-heading">
                <h3>Bình luận</h3>
                <span id="comment-count">0 bình luận</span>
            </div>
            <form class="comment-form" id="comment-form">
                <label for="comment-content">Nội dung bình luận</label>
                <textarea id="comment-content" rows="3" placeholder="Viết bình luận của bạn..." required></textarea>
                <button class="btn mt-3" type="submit">Gửi bình luận</button>
            </form>
            <div class="comment-list" id="comment-list"></div>
        </section>
        <section class="related">
            <h3>Có thể bạn quan tâm</h3>
            <div id="related" class="related-grid"></div>
        </section>
    </main>
    <button class="backtop" id="back-top">↑</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../config/messages.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../utils/validators.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../services/api.js"></script>
    <script src="../services/postService.js"></script>
    <script src="../services/userService.js"></script>
    <script src="../services/bookmarkService.js"></script>
    <script src="../services/commentService.js"></script>
    <script src="../services/authService.js"></script>
    <script src="../components/articleCard.js"></script>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../scripts/article.js"></script>
</body>
</html>
